name: 🚀 Fast Deploy - CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Prevent multiple deployments from running simultaneously
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ⚡ Test & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm install

      - name: 🔎 Lint
        run: npm run lint

      - name: 🧪 Unit tests
        run: npm test

      - name: 🔍 Quality Checks
        run: |
          echo "🧪 Running Syntax Checks..."
          # xargs propagates node's exit code; the old `find -exec … \;` swallowed it.
          git ls-files 'public/js/*.js' 'public/*.js' | xargs -n1 node --check

          echo "🧪 Running Validation..."
          # Test if HTML is valid and config exists
          grep -q "<!DOCTYPE" public/index.html || (echo "❌ HTML Error" && exit 1)
          grep -q "firebaseConfig" public/js/config.js || (echo "❌ Config Error" && exit 1)
          
          echo "✅ All checks passed!"

      - name: 🚀 Deploy to Firebase
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        # Ships hosting AND both rule sets — firestore.rules / database.rules.json in
        # this repo are the source of truth. Test rule changes against a scratch
        # project first (.agent/workflows/deploy.md).
        run: npx firebase deploy --only hosting,firestore,database --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: 📢 Status Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Successfully deployed! 🔗 https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"
          else
            echo "❌ Deployment or Tests failed!"
            exit 1
          fi